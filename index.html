<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>book-manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="bookstore.js" defer></script>
</head>
<body>
    <h3>Book Manager</h3>

    <div class="bigger-container">
        
        <div class="nav-container">
                
            <button class="addBook-btn">ADD</button>
            <button class="removeBook-btn">REMOVE</button>

        </div>

        <div class="container">
            <div class="bookName">
                <h3>Name</h3> 
                <div class="bookName-list"></div> 
            </div>
            <div class="author ">
                <h3>Author</h3> 
                <div class="authors-list"></div> 
            </div>
            <div class="pages ">
                <h3>Pages</h3> 
                <div class="pages-list"></div> 
            </div>
            <div class="readStatus ">
                <h3>Read</h3> 
                <div class="reads-list"></div> 
            </div>
        </div>
    </div>

    <dialog id = "addDialog">

        <div class="upper-dialog-cont">
            <input id="book-name" type ="text" placeholder="book name">
            <input id="book-author"  type="text" placeholder="Author">
            <input id="book-pages"   type="text" placeholder="pages">

            <div class="read-status-div">
                <input id="book-read"  type="checkbox" >
                <label for="book-read">read status</label>
                
            </div>
        </div>
        
        <div class="submit-button">
            <button id="submit" method = "submit">submit</button>
            <button id="cancel">cancel</button>
        </div>
        
    </dialog>
    
    <dialog id = "removeDialog">    
        
    </dialog>
    
</body>
</html>
